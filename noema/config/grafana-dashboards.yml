# Grafana Dashboard Provisioning
# Automatically loads dashboards from config/grafana-dashboards/

apiVersion: 1

providers:
  - name: Noema
    orgId: 1
    folder: "Noema"
    type: file
    disableDeletion: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: true
