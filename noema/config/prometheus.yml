# ────────────────────────────────────────────────────────────────
# Noema — Prometheus Configuration
# ────────────────────────────────────────────────────────────────
# Scrapes metrics from the Noema Python app and infrastructure.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 30s

  external_labels:
    cluster: noema
    environment: ${ENV:-development}

# Alertmanager (optional — uncomment and configure to enable)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: []

# Rules for alert evaluation
# rule_files:
#   - "alerts/*.yml"

scrape_configs:
  # ── Noema Application Metrics ────────────────────────────
  - job_name: noema-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - "host.docker.internal:8000"  # When app runs on host
          # - "noema-app:8000"           # When app runs in Docker
    scrape_interval: 10s
    scrape_timeout: 5s

  # ── Prometheus Self-Monitoring ───────────────────────────
  - job_name: prometheus
    static_configs:
      - targets:
          - "localhost:9090"

  # ── Redis Exporter (if redis_exporter is running) ────────
  # Install: docker run -d --name redis_exporter --network noema_net \
  #   -e REDIS_ADDR=redis://redis:6379 \
  #   -e REDIS_PASSWORD=noema_redis_dev \
  #   -p 9121:9121 oliver006/redis_exporter
  # - job_name: redis
  #   static_configs:
  #     - targets:
  #         - "redis_exporter:9121"

  # ── PostgreSQL Exporter (if postgres_exporter is running) ─
  # Install: docker run -d --name postgres_exporter --network noema_net \
  #   -e DATA_SOURCE_NAME="postgresql://noema:noema_dev@postgres:5432/noema?sslmode=disable" \
  #   -p 9187:9187 quay.io/prometheuscommunity/postgres-exporter
  # - job_name: postgres
  #   static_configs:
  #     - targets:
  #         - "postgres_exporter:9187"

  # ── Node Exporter (system metrics) ───────────────────────
  # Install: docker run -d --name node_exporter --network host \
  #   -p 9100:9100 quay.io/prometheus/node_exporter
  # - job_name: node
  #   static_configs:
  #     - targets:
  #         - "host.docker.internal:9100"
