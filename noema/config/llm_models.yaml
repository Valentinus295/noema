  z-ai/glm-5.1:                      { input: 0.00,  output: 0.00  }  # Free Endpoint
  nvidia/nemotron-3-ultra-550b-a55b: { input: 0.00,  output: 0.00  }  # Free Endpoint

  # === Fast fallbacks (NIM — pricing TBD) ===
  nvidia/nemotron-mini-4b-instruct:  { input: 0.00,  output: 0.00  }  # NIM preview
  google/gemma-3-4b-it:              { input: 0.00,  output: 0.00  }  # NIM preview

  # === Local tier fallbacks (self-hosted — zero API cost) ===
  nvidia/nemotron-3-nano-30b-a3b:    { input: 0.00,  output: 0.00  }
