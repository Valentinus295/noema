# =============================================================================
# Noema LLM Model Configuration
# =============================================================================
# All models via NVIDIA NIM (https://integrate.api.nvidia.com/v1)
# FREE for NVIDIA Developer Program members — register at build.nvidia.com
#
# Models marked "FREE" have zero-cost endpoints (nim_type_preview).
# Others are included in developer credits.
# =============================================================================

tiers:
  decision:
    description: "CIO, Trade Thesis, Devil's Advocate — critical decisions"
    primary: "minimaxai/minimax-m3"
    fallbacks:
      - "deepseek-ai/deepseek-v4-pro"                # FREE — top reasoning (GPQA 90.1%)
      - "moonshotai/kimi-k2.6"                       # FREE — best agentic (HLE 54%)
      - "nvidia/nemotron-3-ultra-550b-a55b"           # FREE — 1M ctx, finance-trained
      - "nvidia/llama-3.1-nemotron-ultra-253b-v1"     # NVIDIA Ultra 253B
    temperature: 0.1
    max_tokens: 2048
    latency_budget_s: 15.0
    rpm_limit: 20

  analysis:
    description: "Macro, Fundamental — context interpretation"
    primary: "minimaxai/minimax-m3"
    fallbacks:
      - "z-ai/glm-5.1"                                # FREE — most used (27.6M calls/mo)
      - "minimaxai/minimax-m2.7"                       # MiniMax M2.7
      - "meta/llama-4-maverick-17b-128e-instruct"       # Llama 4 Maverick
      - "nvidia/llama-3.3-nemotron-super-49b-v1.5"     # NVIDIA Super 49B
    temperature: 0.2
    max_tokens: 1536
    latency_budget_s: 10.0
    rpm_limit: 40

  fast:
    description: "Momentum, Price Action, Session, S/R — technical"
    primary: "minimaxai/minimax-m3"
    fallbacks:
      - "deepseek-ai/deepseek-v4-pro"                 # FREE — fast reasoning
      - "minimaxai/minimax-m2.7"                       # MiniMax M2.7
      - "deepseek-ai/deepseek-v4-flash"                # DeepSeek Flash
      - "google/gemma-4-31b-it"                        # Google Gemma 4
    temperature: 0.0
    max_tokens: 1024
    latency_budget_s: 5.0
    rpm_limit: 100

providers:
  nvidia_nim:
    base_url: "https://integrate.api.nvidia.com/v1"
    api_key_env: "NIM_API_KEY"
    type: "openai_compatible"

instructor:
  mode: "md_json"
  max_retries: 3
  validation_context: true

