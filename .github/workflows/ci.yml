name: Noema CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  CARGO_TERM_COLOR: "always"

jobs:
  # ── Python Linting ──────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --only-group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  # ── Python Tests (matrix) ───────────────────────────────────
  test-python:
    name: Python ${{ matrix.python-version }} Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests with coverage
        run: |
          uv run pytest \
            --cov=noema \
            --cov-report=xml:coverage-${{ matrix.python-version }}.xml \
            --cov-report=term-missing \
            -v \
            tests/

      - name: Upload coverage to Codecov (optional)
        if: success()
        uses: codecov/codecov-action@v5
        with:
          files: coverage-${{ matrix.python-version }}.xml
          flags: python,${{ matrix.python-version }}
        continue-on-error: true

  # ── Rust Build & Test ───────────────────────────────────────
  test-rust:
    name: Rust Build + Test
    runs-on: ubuntu-latest
    # Only run if rust/ directory has changes or on PRs touching it
    steps:
      - uses: actions/checkout@v4

      - name: Check if rust/ exists
        id: check-rust
        run: |
          if [ -d "rust" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust toolchain
        if: steps.check-rust.outputs.exists == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust dependencies
        if: steps.check-rust.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Rust format check
        if: steps.check-rust.outputs.exists == 'true'
        working-directory: rust
        run: cargo fmt --all --check

      - name: Rust clippy
        if: steps.check-rust.outputs.exists == 'true'
        working-directory: rust
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust build (pure-rust, no PyO3)
        if: steps.check-rust.outputs.exists == 'true'
        working-directory: rust
        run: cargo build --no-default-features --features pure-rust --release

      - name: Rust tests
        if: steps.check-rust.outputs.exists == 'true'
        working-directory: rust
        run: cargo test --no-default-features --features pure-rust --release

  # ── Docker Build Validation ─────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config

      # Only build Docker image if Dockerfile exists
      - name: Check Dockerfile
        id: check-dockerfile
        run: |
          if [ -f "Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        if: steps.check-dockerfile.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: noema:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Checks ─────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v4

      - name: Install test deps
        run: uv sync --only-group dev

      - name: Detect secrets
        run: uv run detect-secrets scan --all-files

      - name: Audit dependencies
        run: uv run pip-audit

  # ── PR Summary ─────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, test-python, test-rust, docker, security]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Tests | ${{ needs.test-python.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rust Build | ${{ needs.test-rust.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker | ${{ needs.docker.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY

          # Fail if any critical job failed
          FAILED=0
          if [ "${{ needs.lint.result }}" != "success" ] && [ "${{ needs.lint.result }}" != "skipped" ]; then FAILED=1; fi
          if [ "${{ needs.test-python.result }}" != "success" ]; then FAILED=1; fi
          if [ "${{ needs.security.result }}" != "success" ] && [ "${{ needs.security.result }}" != "skipped" ]; then FAILED=1; fi
          exit $FAILED
